name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check package contents
        run: npm pack --dry-run

      - name: Create release pull request or publish
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
        env:
          # Use a PAT or GitHub App token when repository settings block
          # GitHub Actions from creating pull requests with GITHUB_TOKEN.
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          # Either configure npm Trusted Publishing for this workflow, or add
          # an npm automation token as NPM_TOKEN in repository secrets.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
